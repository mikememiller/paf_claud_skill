meta:
  domain: "AP invoice automation"
  agent_name: "EBS AP Invoice Automation Agent"
  package: ebs_ap_paf                      # snake_case repo / python package
  kicker: "PRIVATE AGENT FACTORY · ORACLE E-BUSINESS SUITE"
  headline: "AP Invoice Automation Agent"
  subhead: >-
    Invoice-to-Match for EBS — extract, 3-way match, and code supplier invoices
    straight into the Payables Open Interface, validated against your live EBS data.
  title_stats:                             # 3 hero stats on the title slide
    - { big: "$2–3",   label: "cost / invoice, automated" }
    - { big: "~$930K", label: "annual value (50K invoices)" }
    - { big: "100%",   label: "audit trail preserved" }

# --- deck: problem / solution / value ----------------------------------------
problem:
  title: "Manual AP is slow, costly, and error-prone"
  cards:                                   # icon ∈ allowed set (see build_sales_deck.js ICONS)
    - { icon: file,    big: "$12–15",    desc: "fully-loaded cost to process one invoice by hand" }
    - { icon: gauge,   big: "8–10 days", desc: "typical cycle time — late payments, missed discounts" }
    - { icon: magnify, big: "1–3%",      desc: "of spend lost to duplicate and over-billed invoices" }
  note: >-
    AP automation is a $3B+ category with multiple unicorns. Every EBS shop runs
    tens of thousands to millions of invoices a year — and pays incumbents $3–8 each.

solution:
  title: "An EBS-native agent that does the AP grunt work"
  cards:
    - { icon: robot,    title: "Reads any invoice",    desc: "PDF, email or text — a deterministic parser (zero external deps) with an optional LLM for messy/scanned docs." }
    - { icon: database, title: "Checks live EBS",      desc: "Supplier, PO, receipts, tax and GL — read-only, org-scoped lookups against the real E-Business Suite." }
    - { icon: scale,    title: "Matches & codes",      desc: "Deterministic 3-way match with price/qty tolerances, GL distribution inheritance and tax classification." }
    - { icon: check,    title: "Validates & delivers", desc: "A QA gate proves every invoice balances before it writes balanced AP Open Interface files." }
  note: "Same agentic pattern as Oracle's Private Agent Factory contract-renewal blog — pointed at the far larger AP revenue pool."

# --- the hero architecture/flow diagram (build_diagrams.js) + deck arch slide -
architecture:
  title: "EBS 19c owns the data + logic; PAF + managed MCP do the rest"
  subhead: "Agentic AP automation on OCI · EBS 19c system of record · managed MCP"
  tiers:                                   # N columns, left→right; accent ∈ navy|cyan|green|gold
    - title: "PAF — Agent Builder"
      subtitle: "on ADB 26ai sidecar"
      accent: navy
      items: ["LLM extract → tool calls", "Condition (QA) → output", "NO EBS DATA · not in the data path"]
    - title: "OCI Database Tools — Managed MCP"
      subtitle: "HTTPS · OAuth / IAM · audited"
      accent: cyan
      items: ["custom tool: match_code_and_validate", "SQL Reports (governed reads)", "Database Tools Connection · private endpoint"]
    - title: "EBS 19c (OCI DBaaS)"
      subtitle: "System of record · NNE"
      accent: navy
      items: ["XXPAF PL/SQL (all logic)", "3-way match · coding · QA", "AP_*_INTERFACE → Open Interface Import"]
  flow: "document → PAF LLM extract → match_code_and_validate (XXPAF) → balanced AP interface rows → Payables Open Interface Import"
  flow_note: "Read/validate via MCP · writes loaded by the standard import · deterministic logic + QA in EBS"

controls:                                  # deck "trust & control" slide
  title: "Built for auditors, not just speed"
  cards:
    - { icon: lock,   title: "Read-only by design", desc: "Only SELECTs against EBS; the single write path is off by default and touches interface tables only." }
    - { icon: shield, title: "Multi-org safe",      desc: "Org-scoped queries + FND_GLOBAL.APPS_INITIALIZE context; bind variables everywhere — no injection surface." }
    - { icon: scale,  title: "Deterministic policy", desc: "Match, tolerance and coding rules live outside the LLM — reproducible and explainable for SOX." }
    - { icon: check,  title: "QA gate before load",  desc: "Every invoice is checked to balance, reconcile and resolve all FKs; failures are held, never imported." }
  note: "Every interface row is stamped with the agent run-id and a confidence score — traceable end to end."

proof:                                     # optional live-proof slide (omit the key to skip)
  kicker: "PROVEN ON LIVE EBS VISION DATA"
  title: "Real invoice. Real PO. Clean match."
  scenario_title: "Purchase Order 3495"
  scenario_sub: "Advanced Network Devices · Org 204 · Oracle EBS 19c Vision"
  rows:
    - { a: "4 lines",              b: "monitors, RAM, hard drives" }
    - { a: "500 / 500",           b: "invoiced vs received on every line" }
    - { a: "01-520-7530-0000-000", b: "GL distribution inherited from the PO" }
    - { a: "$632,500.00",         b: "invoice total — header balances to lines" }
  status: "PASS"
  status_note: "All 4 lines auto-approved · 0 errors · loadable"
  caption: "Verified against the live database during the build — not a mock."

why_us:
  title: "The partner to put this into production"
  cards:
    - { icon: database,  title: "Deep EBS expertise",     desc: "Decades running Oracle E-Business Suite for enterprise customers — we know your AP, PO and GL setup." }
    - { icon: bolt,      title: "Reference build in hand", desc: "A working, QA'd agent proven against live Vision data — not slideware. Ready to point at your instance." }
    - { icon: handshake, title: "OCI + PAF aligned",       desc: "Positioned for the Private Agent Factory motion on AI Database 26ai, with TCO and licensing mapped." }

next_steps:
  title: "Let's run it on your EBS instance"
  steps:
    - { title: "Discovery",      desc: "Confirm AP volumes, invoice mix and target operating unit." }
    - { title: "Proof of value", desc: "Point the agent at a read-only EBS copy; demo a live 3-way match." }
    - { title: "Productionize",  desc: "Deploy on PAF / 26ai with AME approvals and scheduled import." }

