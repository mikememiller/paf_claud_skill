# --- functional-flow hero diagram (build_diagrams.js --kind flow) ------------
flow_diagram:
  title: "How the agent works — functional flow"
  subhead: "Document → extract → governed lookups → deterministic policy → QA → interface"
  steps:
    - { step: "Ingest",       detail: "PDF / email / text invoice arrives" }
    - { step: "Extract",      detail: "PAF LLM node → structured invoice JSON" }
    - { step: "Look up",      detail: "governed EBS reads: supplier · PO · receipts · tax · GL (MCP)" }
    - { step: "Match & code", detail: "deterministic 3-way match + GL/tax coding (XXPAF)" }
    - { step: "QA gate",      detail: "balance · reconcile · resolve FKs — PASS / HOLD" }
    - { step: "Deliver",      detail: "balanced AP interface rows → Open Interface Import" }
  branch: { label: "Exception / HOLD", detail: "routed to human review (AME approval) — never auto-loaded" }

