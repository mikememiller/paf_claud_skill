# --- technical design doc (build_docx.py) ------------------------------------
tech_design:
  intro: >-
    EBS 19c (OCI DBaaS/Exadata) is the system of record and the home of all logic —
    the XXPAF_AP_AGENT PL/SQL package. PAF runs on an ADB 26ai sidecar holding zero
    EBS data and is not in the data path. The OCI Database Tools Managed MCP (HTTPS +
    OAuth/IAM) exposes XXPAF as a governed custom tool + SQL Reports over a Database
    Tools Connection — no broker, no DB link, no thick-mode in production.
  processing:
    - "Extraction in the PAF LLM node → invoice JSON"
    - "match_code_and_validate (XXPAF): supplier resolve, duplicate check, 3-way match (dual %/$ tolerance), GL/tax coding, QA gate"
    - "Balanced AP interface rows (header = Σ lines incl. TAX line)"
    - "Load via the standard Payables Open Interface Import (writes off the MCP path)"
  interface_contract:
    - ["Header table", "AP_INVOICES_INTERFACE"]
    - ["Lines table", "AP_INVOICE_LINES_INTERFACE"]
    - ["Import program", "Payables Open Interface Import"]
    - ["Tolerances", "price 2% & $25 · qty 5% & $25 (dual gate)"]
  assurance: >-
    Deterministic logic in PL/SQL; the Python reference engine is the test oracle
    (parity test asserts Python == PL/SQL on golden PO 3495 → balanced $632,500.00,
    QA PASS).

# --- installation guide (build_docx.py) --------------------------------------
install:
  prereqs:
    - "Python 3.10+ (reference engine / dev & test)"
    - "Oracle Instant Client (thick mode, NNE) for dev/test only"
    - "Access to the target EBS 19c (OCI DBaaS/Exadata)"
    - "For production: OCI Database Tools + Managed MCP enabled (no local client needed)"
  steps:
    - title: "Install (dev/test)"
      body: "Outputs land in output/: the interface CSVs, agent_trace.json and qa_report.json."
      code: ["./setup.sh && source .venv/bin/activate", "ebs-ap-paf sample_data/invoice.txt --backend mock"]
    - title: "Deploy the EBS logic"
      body: "Compile the XXPAF package into EBS 19c (system of record + logic)."
      code: ["@db/xxpaf_install.sql   -- schema + least-privilege grants", "@db/xxpaf_pkg.sql       -- XXPAF_AP_AGENT package"]
    - title: "Import the agent + wire PAF (production)"
      body: "Import the .paf (PAF → My Custom Flows → Import; password simple4u), register the OCI managed MCP, rebind the MCP node + LLM, then run the validation gate."
      code: ["python core/scripts/paf_packager.py pack --in flow.json --flowgraph --name \"<Agent>\""]

