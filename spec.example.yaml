# --- technical wiring (not used by deliverable generators; kept for the build) -
org_id: 204
source:
  - { name: get_supplier, tables: [ap_suppliers, ap_supplier_sites_all, ap_terms] }
  - { name: get_purchase_order, tables: [po_headers_all, po_lines_all, po_line_locations_all, po_distributions_all, gl_code_combinations_kfv, mtl_system_items_b] }
  - { name: get_receipts, tables: [rcv_transactions] }
  - { name: get_tax_code, tables: [zx_rates_b] }
  - { name: check_duplicate_invoice, tables: [ap_invoices_all] }
target_interface:
  header_table: AP_INVOICES_INTERFACE
  lines_table: AP_INVOICE_LINES_INTERFACE
  import_program: "Payables Open Interface Import"
  write_via: standard_import
policy:
  type: three_way_match
  tolerances: { price_pct: 2, qty_pct: 5, dollar_floor: 25 }
golden_record:
  key: "PO 3495"
  notes: "vendor 21 Advanced Network Devices, 4 lines, fully received, $632,500.00"
paf:
  mcp: oci_managed
  llm_model: "xai.grok-4"
  plsql_schema: XXPAF
  import_password: simple4u
